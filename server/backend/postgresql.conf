# PostgreSQL Configuration pour VM limitée (1GB RAM)
# Optimisations pour serveur avec ressources limitées

# Connexions
max_connections = 20
shared_preload_libraries = 'pg_stat_statements'

# Mémoire - Optimisé pour 1GB VM
shared_buffers = 64MB
effective_cache_size = 128MB
work_mem = 2MB
maintenance_work_mem = 16MB

# Checkpoints
checkpoint_completion_target = 0.9
wal_buffers = 8MB
default_statistics_target = 50

# Logging - Réduit pour économiser l'espace
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 5000
log_checkpoints = off
log_connections = off
log_disconnections = off
log_lock_waits = on

# Performance pour VM limitée
random_page_cost = 4.0
effective_io_concurrency = 1
