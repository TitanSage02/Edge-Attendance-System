# Configuration Mosquitto avec support TLS
# Alignée avec les certificats Caddy

# Configuration générale
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type all

# Configuration standard (non-TLS)
listener 1883
protocol mqtt
allow_anonymous false
password_file /mosquitto/config/passwd

# Configuration TLS/SSL
listener 8883
protocol mqtt
allow_anonymous false
password_file /mosquitto/config/passwd

# Certificats TLS (utilisant les certificats Caddy)
cafile /mosquitto/certs/acme-v02.api.letsencrypt.org-directory/api-presence.crec-sj.org/api-presence.crec-sj.org.crt
certfile /mosquitto/certs/acme-v02.api.letsencrypt.org-directory/api-presence.crec-sj.org/api-presence.crec-sj.org.crt
keyfile /mosquitto/certs/acme-v02.api.letsencrypt.org-directory/api-presence.crec-sj.org/api-presence.crec-sj.org.key

# Configuration WebSocket sécurisé
listener 9001
protocol websockets
allow_anonymous false
password_file /mosquitto/config/passwd

# Configuration de sécurité
tls_version tlsv1.2
require_certificate false
use_identity_as_username false

# Limitations
max_connections 100
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 1024

# ACL (optionnel)
# acl_file /mosquitto/config/acl.conf

# Logs de sécurité
log_type error
log_type warning
log_type notice
log_type information
log_type debug
